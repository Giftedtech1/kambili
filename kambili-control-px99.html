<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Dashboard | Kambili Scents</title>
  <link rel="icon" href="images/kambili%20logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <header>
    <div class="container navbar">
      <a href="kambili-control-px99.html" class="logo" style="display: flex; align-items: center; gap: 10px;">
        <img src="images/kambili%20logo.png" alt="Kambili Admin" style="height: 40px;">
        <span style="font-size: 1.2rem;">Admin</span>
      </a>
      <div class="nav-links">
        <a href="index.html">View Live Store</a>
      </div>
    </div>
  </header>

  <main class="admin-container">
    <div class="admin-header">
      <h1>Product Management</h1>
      <button class="btn btn-primary" id="add-product-btn">+ Add New Product</button>
    </div>

    <!-- Add/Edit Product Form -->
    <div class="admin-card" id="product-form-card" style="display: none;">
      <h2 id="form-title">Add New Product</h2>
      <form id="product-form">
        <input type="hidden" id="product-id">
        <div class="form-row">
          <div class="form-group">
            <label for="product-name">Product Name</label>
            <input type="text" id="product-name" class="form-control" required placeholder="e.g. Midnight Oud">
          </div>
          <div class="form-group">
            <label for="product-price">Price (₦)</label>
            <input type="number" id="product-price" class="form-control" required min="0" placeholder="e.g. 25000">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="product-category">Category</label>
            <select id="product-category" class="form-control" required>
              <option value="">Select Category</option>
              <option value="Men">Men</option>
              <option value="Women">Women</option>
              <option value="Unisex">Unisex</option>
            </select>
          </div>
          <div class="form-group">
            <label for="product-stock">Stock Status</label>
            <select id="product-stock" class="form-control" required>
              <option value="in">In Stock</option>
              <option value="out">Out of Stock</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="product-image">Product Image</label>
          <input type="file" id="product-image" class="form-control" accept="image/*">
          <small id="image-upload-status" style="display: block; margin-top: 5px; color: var(--text-muted);"></small>
          <input type="hidden" id="product-image-url">
        </div>
        <div class="action-btns">
          <button type="submit" class="btn btn-primary">Save Product</button>
          <button type="button" class="btn btn-outline" id="cancel-btn">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Products List -->
    <div class="admin-card">
      <h2>All Products</h2>
      <div class="admin-table-wrapper">
        <table class="admin-table" id="products-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Price</th>
              <th>Category</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <!-- Dynamic rows will be injected here -->
          </tbody>
        </table>
      </div>
      <div id="no-products-msg" class="empty-state" style="display: none;">
        <p>No products found. Click "Add New Product" to get started.</p>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="kambili-control-px99.js"></script>
</body>
</html>
